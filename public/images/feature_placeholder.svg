<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <!-- Subtle tech pattern background -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#dee2e6" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="400" height="300" fill="#f8f9fa"/>
  <rect width="400" height="300" fill="url(#grid)"/>
  
  <circle cx="200" cy="150" r="60" fill="none" stroke="#ffcc00" stroke-width="8"/>
  <circle cx="200" cy="150" r="30" fill="#121212"/>
  <line x1="200" y1="90" x2="200" y2="50" stroke="#121212" stroke-width="4"/>
  <line x1="200" y1="210" x2="200" y2="250" stroke="#121212" stroke-width="4"/>
  <line x1="140" y1="150" x2="100" y2="150" stroke="#121212" stroke-width="4"/>
  <line x1="260" y1="150" x2="300" y2="150" stroke="#121212" stroke-width="4"/>
</svg>